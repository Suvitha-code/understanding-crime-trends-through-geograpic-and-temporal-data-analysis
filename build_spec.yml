version: 0.1
component: build
timeoutInSeconds: 600

shell: bash

steps:
  - type: Command
    name: Install Dependencies
    command: |
      echo "Installing dependencies..."
      npm install

  - type: Command
    name: Build
    command: |
      echo "Building project..."
      npm run build

  - type: Command
    name: Done
    command: |
      echo "Build completed"
