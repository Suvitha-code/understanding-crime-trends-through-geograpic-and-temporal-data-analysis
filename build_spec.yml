version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      # If you create a requirements.txt later, uncomment the line below:
      # - pip install -r requirements.txt

  build:
    commands:
      - echo "Running Python script check..."
      # This simply checks if the script runs without syntax errors
      - python -m py_compile crime.py
      - echo "Build phase complete."

  post_build:
    commands:
      - echo "Build completed on `date`"

artifacts:
  files:
    - crime.py
    - crime_data.csv
    - Phase-1 Abstract.docx
